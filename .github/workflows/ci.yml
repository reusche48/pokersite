name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — tests del motor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Instalar dependencias
        working-directory: backend
        run: npm ci
      - name: Ejecutar tests (motor: pots, evaluador, validador, baraja)
        working-directory: backend
        run: npm test

  web:
    name: Web — lint y build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Instalar dependencias
        working-directory: web
        run: npm ci
      - name: Lint (advisory — no bloquea mientras se limpia la deuda existente)
        working-directory: web
        run: npm run lint
        continue-on-error: true
      - name: Build de producción
        working-directory: web
        run: npm run build
